name: k6 tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run-k6-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Subir WireMock (API mock)
        run: |
          docker run -d --name wiremock -p 8080:8080 \
            -v "${{ github.workspace }}/mappings:/home/wiremock/mappings" \
            -v "${{ github.workspace }}/__files:/home/wiremock/__files" \
            wiremock/wiremock

      - name: Aguardar WireMock ficar pronto
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:8080/ws/58042019/json/ > /dev/null; then
              echo "WireMock está no ar."
              exit 0
            fi
            echo "Aguardando WireMock subir..."
            sleep 2
          done
          echo "WireMock não subiu a tempo."
          docker logs wiremock || true
          exit 1

      - name: Rodar testes k6 (Docker)
        run: |
          docker run --rm --network=host -v "${{ github.workspace }}:/scripts" grafana/k6 run /scripts/tests/test-loginsucesso.js
          docker run --rm --network=host -v "${{ github.workspace }}:/scripts" grafana/k6 run /scripts/tests/test-login500.js
          docker run --rm --network=host -v "${{ github.workspace }}:/scripts" grafana/k6 run /scripts/tests/test-cep500.js
          docker run --rm --network=host -v "${{ github.workspace }}:/scripts" grafana/k6 run /scripts/tests/test-cepsucess.js

